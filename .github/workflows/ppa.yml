name: Publish PPA

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Existing GitHub Release tag to publish to the PPA
        required: true
        default: v0.1.1

permissions:
  contents: read

env:
  PPA_OWNER: iskrantxusa
  PPA_NAME: codex-history-viewer

jobs:
  upload:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.release.prerelease == false }}
    name: Ubuntu ${{ matrix.ubuntu }} (${{ matrix.series }})
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        include:
          - series: noble
            ubuntu: "24.04"
          - series: resolute
            ubuntu: "26.04"
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}
      - name: Resolve release tag
        env:
          EVENT_TAG: ${{ github.event.release.tag_name }}
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          TAG="${EVENT_TAG:-$INPUT_TAG}"
          case "$TAG" in v*) ;; *) echo "Release tag must start with v."; exit 1 ;; esac
          echo "TAG=$TAG" >> "$GITHUB_ENV"
          echo "VERSION=${TAG#v}" >> "$GITHUB_ENV"
      - name: Download standalone release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p dist/ppa-assets
          gh release download "$TAG" --dir dist/ppa-assets \
            --pattern SHA256SUMS \
            --pattern codex-history-linux-x64.tar.gz \
            --pattern codex-history-linux-arm64.tar.gz
          cd dist/ppa-assets
          sha256sum -c SHA256SUMS --ignore-missing
      - name: Install Debian upload tools
        run: |
          sudo apt-get update
          sudo apt-get install -y debhelper devscripts dput
      - name: Import PPA signing key
        env:
          PPA_GPG_PRIVATE_KEY: ${{ secrets.PPA_GPG_PRIVATE_KEY }}
        run: |
          test -n "$PPA_GPG_PRIVATE_KEY"
          export GNUPGHOME="$RUNNER_TEMP/gnupg"
          mkdir -p "$GNUPGHOME"
          chmod 700 "$GNUPGHOME"
          printf '%s' "$PPA_GPG_PRIVATE_KEY" | gpg --batch --import
          key_id="$(gpg --batch --with-colons --list-secret-keys | awk -F: '$1 == "sec" { print $5; exit }')"
          test -n "$key_id"
          echo "GNUPGHOME=$GNUPGHOME" >> "$GITHUB_ENV"
          echo "PPA_GPG_KEY_ID=$key_id" >> "$GITHUB_ENV"
      - name: Build signed source upload
        env:
          SERIES: ${{ matrix.series }}
          UBUNTU_VERSION: ${{ matrix.ubuntu }}
          PPA_GPG_PASSPHRASE: ${{ secrets.PPA_GPG_PASSPHRASE }}
        run: |
          test -n "$PPA_GPG_PASSPHRASE"
          source_dir="$(VERSION="$VERSION" SERIES="$SERIES" UBUNTU_VERSION="$UBUNTU_VERSION" ./scripts/build-ppa-source.sh)"
          encoded_passphrase="$(printf '%s' "$PPA_GPG_PASSPHRASE" | base64 -w0)"
          umask 077
          cat > "$RUNNER_TEMP/gpg-sign" <<EOF
          #!/bin/sh
          passphrase="\$(printf '%s' '$encoded_passphrase' | base64 -d)"
          exec gpg --batch --yes --pinentry-mode loopback --passphrase "\$passphrase" "\$@"
          EOF
          chmod 700 "$RUNNER_TEMP/gpg-sign"
          (
            cd "$source_dir"
            debuild -S -sa -d -p"$RUNNER_TEMP/gpg-sign" -k"$PPA_GPG_KEY_ID"
          )
          changes="$(dirname "$source_dir")/codex-history-viewer_${VERSION}-1ppa1~${SERIES}1_source.changes"
          test -f "$changes"
          dput "ppa:$PPA_OWNER/$PPA_NAME" "$changes"
