name: Publish PPA

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Existing GitHub Release tag to publish to the PPA
        required: true
        default: v0.1.1
      series:
        description: Ubuntu series to upload
        required: true
        default: all
        type: choice
        options:
          - all
          - noble
          - resolute
      ppa_revision:
        description: PPA revision number, as in 1ppaN
        required: true
        default: "1"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PPA_OWNER: iskrant
  PPA_NAME: codex-history

jobs:
  upload:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.release.prerelease == false }}
    name: Ubuntu ${{ matrix.ubuntu }} (${{ matrix.series }})
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        include:
          - series: noble
            ubuntu: "24.04"
          - series: resolute
            ubuntu: "26.04"
    steps:
      - name: Select series
        id: selected
        env:
          SELECTED_SERIES: ${{ inputs.series || 'all' }}
        run: |
          if [ "$SELECTED_SERIES" = "all" ] || [ "$SELECTED_SERIES" = "${{ matrix.series }}" ]; then
            echo "upload=true" >> "$GITHUB_OUTPUT"
          else
            echo "upload=false" >> "$GITHUB_OUTPUT"
            echo "Skipping ${{ matrix.series }} because workflow input selected $SELECTED_SERIES."
          fi
      - uses: actions/checkout@v4
        if: steps.selected.outputs.upload == 'true'
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref_name }}
      - name: Resolve release tag
        if: steps.selected.outputs.upload == 'true'
        env:
          EVENT_TAG: ${{ github.event.release.tag_name }}
          INPUT_TAG: ${{ inputs.tag }}
          INPUT_PPA_REVISION: ${{ inputs.ppa_revision || '1' }}
        run: |
          TAG="${EVENT_TAG:-$INPUT_TAG}"
          case "$TAG" in v*) ;; *) echo "Release tag must start with v."; exit 1 ;; esac
          case "$INPUT_PPA_REVISION" in ""|*[!0-9]*) echo "ppa_revision must be a positive integer."; exit 1 ;; esac
          {
            echo "TAG=$TAG"
            echo "VERSION=${TAG#v}"
            echo "PPA_REVISION=$INPUT_PPA_REVISION"
          } >> "$GITHUB_ENV"
      - name: Download standalone release assets
        if: steps.selected.outputs.upload == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p dist/ppa-assets
          gh release download "$TAG" --dir dist/ppa-assets \
            --pattern SHA256SUMS \
            --pattern codex-history-linux-x64.tar.gz \
            --pattern codex-history-linux-arm64.tar.gz
          cd dist/ppa-assets
          sha256sum -c SHA256SUMS --ignore-missing
      - name: Install Debian upload tools
        if: steps.selected.outputs.upload == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y debhelper devscripts dput
      - name: Import PPA signing key
        if: steps.selected.outputs.upload == 'true'
        env:
          PPA_GPG_PRIVATE_KEY: ${{ secrets.PPA_GPG_PRIVATE_KEY }}
        run: |
          test -n "$PPA_GPG_PRIVATE_KEY"
          export GNUPGHOME="$RUNNER_TEMP/gnupg"
          mkdir -p "$GNUPGHOME"
          chmod 700 "$GNUPGHOME"
          printf '%s' "$PPA_GPG_PRIVATE_KEY" | gpg --batch --import
          key_id="$(gpg --batch --with-colons --list-secret-keys | awk -F: '$1 == "sec" { print $5; exit }')"
          test -n "$key_id"
          {
            echo "GNUPGHOME=$GNUPGHOME"
            echo "PPA_GPG_KEY_ID=$key_id"
          } >> "$GITHUB_ENV"
      - name: Build signed source upload
        if: steps.selected.outputs.upload == 'true'
        env:
          SERIES: ${{ matrix.series }}
          UBUNTU_VERSION: ${{ matrix.ubuntu }}
          PPA_GPG_PASSPHRASE: ${{ secrets.PPA_GPG_PASSPHRASE }}
        run: |
          test -n "$PPA_GPG_PASSPHRASE"
          orig_tarball_source=""
          if [ "$PPA_REVISION" != "1" ]; then
            orig_tarball_source="https://launchpad.net/~$PPA_OWNER/+archive/ubuntu/$PPA_NAME/+sourcefiles/codex-history-viewer/${VERSION}-1ppa1~noble1/codex-history-viewer_${VERSION}.orig.tar.gz"
          fi
          source_dir="$(
            VERSION="$VERSION" SERIES="$SERIES" UBUNTU_VERSION="$UBUNTU_VERSION" \
              PPA_REVISION="$PPA_REVISION" ORIG_TARBALL_SOURCE="$orig_tarball_source" \
              ./scripts/build-ppa-source.sh
          )"
          normalized_passphrase="$(printf '%s' "$PPA_GPG_PASSPHRASE" | tr -d '\r\n')"
          encoded_passphrase="$(printf '%s' "$normalized_passphrase" | base64 -w0)"
          umask 077
          cat > "$RUNNER_TEMP/gpg-sign" <<EOF
          #!/bin/sh
          passphrase="\$(printf '%s' '$encoded_passphrase' | base64 -d)"
          exec gpg --batch --yes --pinentry-mode loopback --passphrase "\$passphrase" "\$@"
          EOF
          chmod 700 "$RUNNER_TEMP/gpg-sign"
          (
            cd "$source_dir"
            debuild -S -sa -d -p"$RUNNER_TEMP/gpg-sign" -k"$PPA_GPG_KEY_ID"
          )
          changes="$(dirname "$source_dir")/codex-history-viewer_${VERSION}-1ppa${PPA_REVISION}~${SERIES}1_source.changes"
          test -f "$changes"
          dput "ppa:$PPA_OWNER/$PPA_NAME" "$changes"
